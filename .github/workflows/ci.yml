name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-lint:
    name: Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: server
      - name: Run ESLint
        run: npm run lint
        working-directory: server

  server-test:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: server
      - name: Run tests
        run: npm test
        working-directory: server
        env:
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test

  server-coverage:
    name: Coverage (70% threshold)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: server
      - name: Run coverage
        run: npm run test:coverage
        working-directory: server
        env:
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test

  client-build:
    name: Client Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: client
      - name: Build React app
        run: npm run build
        working-directory: client
        env:
          CI: false

  security:
    name: Security Scan (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Audit server dependencies
        run: npm audit --audit-level=high
        working-directory: server
        continue-on-error: true
      - name: Audit client dependencies
        run: npm audit --audit-level=high
        working-directory: client
        continue-on-error: true

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json
      - name: Install dependencies
        run: npm install
        working-directory: e2e
      - name: Install Chromium
        run: npx playwright install chromium --with-deps
        working-directory: e2e
      - name: Warm up Render backend
        run: |
          echo "Waiting for Render backend to wake up..."
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" https://cs7180-project3-agence.onrender.com/health)
            if [ "$status" = "200" ]; then
              echo "Backend is up (attempt $i)"
              break
            fi
            echo "Attempt $i: got HTTP $status — sleeping 15s"
            sleep 15
          done
      - name: Run E2E tests
        run: npm test
        working-directory: e2e
        env:
          BASE_URL: https://agence-flame.vercel.app
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/

  ai-review:
    name: AI PR Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this pull request for the Agence financial app.
            Focus on:
            1. Agent purity violations (agents must be pure functions — no DB/API calls)
            2. SQL outside of server/db/queries.js
            3. Alpaca/Plaid/Finnhub API boundary violations (see CLAUDE.md)
            4. Missing error handling or broken tests
            5. Security issues (JWT handling, input validation, exposed secrets)
            Be concise. Flag blockers clearly, note suggestions separately.
